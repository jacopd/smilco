<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMILCO — Managed AI for Business</title>
  <meta name="description" content="SMILCO — managed AI for business. AI, down to earth. Launching soon.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,400..900&family=Public+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #101725;
      --ink: #F2F3F0;
      --slate: #A9B2C2;
      --accent: #8B9BFF;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--ink);
      font-family: "Public Sans", system-ui, sans-serif;
      text-align: center;
      padding: 1.5rem;
      overflow: hidden;
    }

    /* --- Ambient background layers --- */
    #net {
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    .glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.35;
      z-index: 0;
      animation: drift 26s ease-in-out infinite alternate;
    }
    .glow.one {
      width: 44vw; height: 44vw;
      left: -12vw; top: -14vh;
      background: #2743E3;
    }
    .glow.two {
      width: 38vw; height: 38vw;
      right: -10vw; bottom: -16vh;
      background: #1B6E8F;
      animation-duration: 34s;
      animation-delay: -12s;
    }
    .glow.three {
      width: 26vw; height: 26vw;
      left: 55vw; top: -10vh;
      background: #5A3FB8;
      animation-duration: 42s;
      animation-delay: -20s;
      opacity: 0.22;
    }
    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(9vw, 7vh) scale(1.18); }
    }

    main, footer { position: relative; z-index: 1; }

    .wordmark {
      font-family: "Archivo", system-ui, sans-serif;
      font-weight: 900;
      font-stretch: 112%;
      font-size: clamp(2.8rem, 10vw, 5.5rem);
      letter-spacing: 0.04em;
      margin: 0;
      animation: rise 1.1s cubic-bezier(0.2, 0.7, 0.2, 1) both;
    }
    .wordmark sup { font-size: 0.35em; color: var(--slate); }
    .motto {
      font-family: "Archivo", system-ui, sans-serif;
      font-weight: 600;
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      color: var(--ink);
      margin: 1.5rem 0 0;
      opacity: 0.9;
    }
    .tagline {
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--accent);
      margin: 1.25rem 0 0;
      animation: rise 1.1s 0.25s cubic-bezier(0.2, 0.7, 0.2, 1) both;
    }
    .soon {
      color: var(--slate);
      margin: 2.5rem 0 0;
      font-size: 1.05rem;
      animation: rise 1.1s 0.5s cubic-bezier(0.2, 0.7, 0.2, 1) both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    footer {
      position: fixed;
      bottom: 1.25rem;
      left: 0; right: 0;
      font-size: 0.75rem;
      color: var(--slate);
      padding: 0 1.5rem;
    }

    @media (prefers-reduced-motion: reduce) {
      .glow, .wordmark, .tagline, .soon { animation: none; }
      #net { display: none; }
    }
  </style>
</head>
<body>
  <canvas id="net" aria-hidden="true"></canvas>
  <div class="glow one" aria-hidden="true"></div>
  <div class="glow two" aria-hidden="true"></div>
  <div class="glow three" aria-hidden="true"></div>

  <main>
    <h1 class="wordmark">SMILCO<sup>&#8482;</sup></h1>
    <p class="motto">AI, down to earth.</p>
    <p class="tagline">Managed AI for business</p>
    <p class="soon">Something practical is coming.<br>
       Reach us in the meantime: <a href="mailto:contact@smilco.com">contact@smilco.com</a></p>
  </main>
  <footer>&copy; 2026 SMILCO<sup>™</sup>. All rights reserved.</footer>

  <script>
  (function () {
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    var canvas = document.getElementById('net');
    var ctx = canvas.getContext('2d');
    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    var W, H, points;

    function resize() {
      W = window.innerWidth; H = window.innerHeight;
      canvas.width = W * dpr; canvas.height = H * dpr;
      canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      var count = Math.max(28, Math.min(70, Math.round(W * H / 26000)));
      points = [];
      for (var i = 0; i < count; i++) {
        points.push({
          x: Math.random() * W,
          y: Math.random() * H,
          vx: (Math.random() - 0.5) * 0.22,
          vy: (Math.random() - 0.5) * 0.22,
          r: 1 + Math.random() * 1.6
        });
      }
    }

    var LINK = 130;
    function frame() {
      ctx.clearRect(0, 0, W, H);
      for (var i = 0; i < points.length; i++) {
        var p = points[i];
        p.x += p.vx; p.y += p.vy;
        if (p.x < -20) p.x = W + 20; else if (p.x > W + 20) p.x = -20;
        if (p.y < -20) p.y = H + 20; else if (p.y > H + 20) p.y = -20;
      }
      for (var i = 0; i < points.length; i++) {
        for (var j = i + 1; j < points.length; j++) {
          var a = points[i], b = points[j];
          var dx = a.x - b.x, dy = a.y - b.y;
          var d = Math.sqrt(dx * dx + dy * dy);
          if (d < LINK) {
            ctx.strokeStyle = 'rgba(139, 155, 255,' + (0.16 * (1 - d / LINK)) + ')';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
        }
      }
      for (var i = 0; i < points.length; i++) {
        var p = points[i];
        ctx.fillStyle = 'rgba(169, 178, 194, 0.55)';
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      }
      requestAnimationFrame(frame);
    }

    window.addEventListener('resize', resize);
    resize();
    requestAnimationFrame(frame);
  })();
  </script>
</body>
</html>
