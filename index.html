<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMILCO — Coming Soon</title>
  <meta name="description" content="SMILCO — AI integration strategy for small business. Launching soon.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,400..900&family=Public+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #101725;
      --ink: #F2F3F0;
      --slate: #A9B2C2;
      --accent: #8B9BFF;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--ink);
      font-family: "Public Sans", system-ui, sans-serif;
      text-align: center;
      padding: 1.5rem;
    }
    .wordmark {
      font-family: "Archivo", system-ui, sans-serif;
      font-weight: 900;
      font-stretch: 112%;
      font-size: clamp(2.8rem, 10vw, 5.5rem);
      letter-spacing: 0.04em;
      margin: 0;
    }
    .wordmark sup { font-size: 0.35em; color: var(--slate); }
    .tagline {
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--accent);
      margin: 1.25rem 0 0;
    }
    .soon {
      color: var(--slate);
      margin: 2.5rem 0 0;
      font-size: 1.05rem;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    footer {
      position: fixed;
      bottom: 1.25rem;
      left: 0; right: 0;
      font-size: 0.75rem;
      color: var(--slate);
      padding: 0 1.5rem;
    }
  </style>
</head>
<body>
  <main>
    <h1 class="wordmark">SMILCO<sup>&#8482;</sup></h1>
    <p class="tagline">AI integration strategy for small business</p>
    <p class="soon">Something practical is coming.<br>
       Reach us in the meantime: <a href="mailto:contact@smilco.com">contact@smilco.com</a></p>
  </main>
  <footer>&copy; 2026 SMILCO&#8482;. All rights reserved.</footer>
</body>
</html>
